name: Linting
on: [pull_request]
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  checkstyle:
    name: Linting Server (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dbelyaev/action-checkstyle@f9a0835c89d30a318614ba4fe5e7f3d776ea17f2  # v3.12.0
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          checkstyle_config: ./server/checkstyle.xml
          checkstyle_version: 10.21.0
          fail_on_error: true
  lint-client:
    name: Linting Client (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: client/.nvmrc
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install modules
        working-directory: ./client
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        working-directory: ./client
        run: pnpm exec eslint --max-warnings 0 .
  lint-keycloakify:
    name: Linting Keycloakify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: client/.nvmrc
          cache: 'pnpm'
          cache-dependency-path: keycloakify/pnpm-lock.yaml
      - name: Install modules
        working-directory: ./keycloakify
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        working-directory: ./keycloakify
        run: pnpm exec eslint --max-warnings 0 .
