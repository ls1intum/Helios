name: Unit and Integration Tests
on:
  pull_request:
    branches: [staging]
    types: [opened, reopened, edited, synchronize]
  push:
    branches: [staging]

permissions:
  contents: read
  checks: write

jobs:
    client-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
          run:
            working-directory: 'client'
        steps:
        - uses: actions/checkout@v7
        - name: Setup pnpm
          uses: pnpm/action-setup@v6
          with:
            version: 11.17.0
        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version-file: client/.nvmrc
            cache: 'pnpm'
            cache-dependency-path: client/pnpm-lock.yaml
        - name: Install Dependencies
          run: pnpm install --frozen-lockfile
        - name: Run Client Unit Tests
          run: pnpm test:unit:ci
        - name: "Codacy: Report coverage"
          uses: codacy/codacy-coverage-reporter-action@v1
          with:
            project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
            coverage-reports: client/coverage/client/lcov.info
          if: (github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name) && (success() || failure())
        - name: Upload Client Test Coverage Report
          if: success() || failure()
          uses: actions/upload-artifact@v7
          with:
              name: Coverage Report Client Tests
              path: client/coverage/client/lcov-report
    build-client:
        # Production AOT build — catches breakages (e.g. incompatible transitive
        # tooling like Babel) that unit tests/lint do NOT surface. This is the
        # exact build the client Docker image runs, so a broken prod build now
        # fails the PR instead of only failing at deploy time.
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
          run:
            working-directory: 'client'
        steps:
        - uses: actions/checkout@v7
        - name: Setup pnpm
          uses: pnpm/action-setup@v6
          with:
            version: 11.17.0
        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version-file: client/.nvmrc
            cache: 'pnpm'
            cache-dependency-path: client/pnpm-lock.yaml
        - name: Install Dependencies
          run: pnpm install --frozen-lockfile
        - name: Build client (production)
          run: pnpm run build --configuration production
    server-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        defaults:
          run:
            working-directory: server
        steps:
        - uses: actions/checkout@v7
        - name: Setup Java
          uses: actions/setup-java@v5
          with:
            distribution: 'temurin'
            java-version: '21'
        - name: Server Tests
          run: set -o pipefail && ./gradlew --console=plain test jacocoTestReport jacocoTestCoverageVerification | tee tests.log        
        - name: Print failed tests
          if: failure()
          run: grep "Test >.* FAILED\$" tests.log || echo "No failed tests."
        - name: "Codacy: Report coverage"
          uses: codacy/codacy-coverage-reporter-action@v1
          with:
            project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
            coverage-reports: server/application-server/build/reports/jacoco/test/jacocoTestReport.xml
          if: (github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name) && (success() || failure())
        - name: Annotate Server Test Results
          uses: ashley-taylor/junit-report-annotations-action@1.4
          if: always()
          with:
            access-token: ${{ secrets.GITHUB_TOKEN }}
            path: server/application-server/build/test-results/test/*.xml
            numFailures: 99
        - name: Upload Server Test Coverage Report
          if: success() || failure()
          uses: actions/upload-artifact@v7
          with:
            name: Coverage Report Server Tests
            path: server/application-server/build/reports/jacoco/test/html/
