name: Pull Request Opened
on:
  pull_request_target:
    types: [opened]

permissions:
  # Only assigns the PR author via the API — no checkout / repo reads needed.
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Pull Request to its Author
        uses: technote-space/assign-author@v1
