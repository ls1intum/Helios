spring:
    application:
        name: Helios
    config:
        import: optional:file:.env[.properties]
    http:
        converters:
            preferred-json-mapper: jackson2
    ai:
        openai:
            api-key: ${OPENAI_API_KEY:dummy-key}
            base-url: ${OPENAI_BASE_URL:https://api.openai.com}
            chat:
                options:
                    model: ${OPENAI_MODEL:gpt-4o-mini}
                    temperature: ${OPENAI_TEMPERATURE:0.0}
                    max-tokens: ${OPENAI_MAX_TOKENS:1200}
    task:
        scheduling:
            pool:
                # This sets the maximum number of threads for scheduled tasks.
                size: 10
    datasource:
        hikari:
            # Hand out pooled connections with auto-commit OFF so reads that run outside an explicit
            # @Transactional (under Open-Session-in-View) still execute inside a DB transaction.
            # Required for PostgreSQL Large Objects (the @Lob PR body + oid release/RC bodies), which
            # cannot be accessed in auto-commit mode — and lets read methods stay annotation-free.
            auto-commit: false
    jpa:
        properties:
            hibernate:
                connection:
                    # The pool already disables auto-commit, so Hibernate skips toggling it per
                    # transaction (saves a round-trip each way) and delays connection acquisition.
                    provider_disables_autocommit: true

springdoc:
    default-produces-media-type: application/json

logging:
    level:
        org.kohsuke.github.GitHubClient: INFO

status-check:
    # How often the status check should run for
    # environments whose status changed recently
    recent-interval: 10s
    # How often the status check should run for
    # environments whose status did not change recently
    # has to be lower than recent-interval
    stable-interval: 120s
    # How long until an environment is considered stable
    # if the status did not change
    recent-threshold: 5m
    # How many status checks should be stored in the database
    # for an environment
    keep-count: 10

cleanup:
    workflow-run:
        dry-run: ${CLEANUP_WORKFLOW_RUN_DRY_RUN:true}
        # runs every day at 01:00 (server time)
        cron: "0 0 1 * * *"
        policies:
            # Test Status: PROCESSED --> keep newest 2 runs, delete every other one regardless of age
            - test-processing-status: PROCESSED
              keep: 2
            # Test Status: FAILED --> keep newest 2 runs, delete older ones only if ≥ 5 days old
            - test-processing-status: FAILED
              keep: 2
              age-days: 5
            # Test Status: NULL --> keep newest 2 runs, delete older ones only if ≥ 5 days old
            - test-processing-status: null
              keep: 2
              age-days: 5
        # Sweep workflow runs whose head_branch no longer exists in the branch
        # table (e.g. feature branches deleted after PR merge). Disabled by
        # default so the historical backlog isn't wiped on the first
        # scheduled tick — operators enable via env after reviewing dry-run
        # output. Skips runs younger than grace-days, runs with a NULL
        # head_branch, and runs referenced by a helios_deployment or
        # deployment row.
        orphan-branches:
            enabled: ${CLEANUP_WORKFLOW_RUN_ORPHAN_BRANCHES_ENABLED:false}
            cron: ${CLEANUP_WORKFLOW_RUN_ORPHAN_BRANCHES_CRON:0 30 3 * * *}
            grace-days: ${CLEANUP_WORKFLOW_RUN_ORPHAN_BRANCHES_GRACE_DAYS:7}
            batch-size: ${CLEANUP_WORKFLOW_RUN_ORPHAN_BRANCHES_BATCH_SIZE:5000}

notification:
    enabled: ${NOTIFICATIONS_ENABLED:true}

reconciliation:
    enabled: ${RECONCILIATION_ENABLED:true}
    deployments:
        cron: "${RECONCILIATION_DEPLOYMENTS_CRON:0 */15 * * * *}"
    workflow-runs:
        cron: "${RECONCILIATION_WORKFLOW_RUNS_CRON:0 7/15 * * * *}"
recovery:
    orphan-helios-deployments:
        cron: "0 0 * * * *"

helios:
    ai:
        enabled: ${HELIOS_AI_ENABLED:true}
        default-provider: ${HELIOS_AI_DEFAULT_PROVIDER:openai}
        providers:
            openai:
                enabled: ${HELIOS_AI_PROVIDER_OPENAI_ENABLED:true}
                model: ${OPENAI_MODEL:gpt-4o-mini}
        test-failure:
            max-section-chars: ${HELIOS_AI_TEST_FAILURE_MAX_SECTION_CHARS:6000}
            rate-limit:
                enabled: ${HELIOS_AI_TEST_FAILURE_RATE_LIMIT_ENABLED:true}
                per-user-burst-max: ${HELIOS_AI_TEST_FAILURE_PER_USER_BURST_MAX:5}
                per-user-burst-window: ${HELIOS_AI_TEST_FAILURE_PER_USER_BURST_WINDOW:10m}
                per-user-daily-max: ${HELIOS_AI_TEST_FAILURE_PER_USER_DAILY_MAX:50}
            cleanup:
                dry-run: ${HELIOS_AI_TEST_FAILURE_CLEANUP_DRY_RUN:false}
                # runs every day at 03:00 (server time)
                cron: "0 0 3 * * *"
                max-age: 14d
    logs:
        base-path: ${HELIOS_LOGS_BASE_PATH:/tmp/helios/workflow-logs}
        cleanup:
            dry-run: ${CLEANUP_WORKFLOW_LOG_DRY_RUN:false}
            # runs every day at 02:00 (server time)
            cron: "0 0 2 * * *"
            max-age: 1d
    # Canonical, always-visible pipeline nodes. Each node is rendered for every branch/PR (PENDING
    # until a matching CI job appears) and maps to GitHub Actions jobs whose name starts with any
    # job-name-matcher (case-insensitive). Defaults target Artemis' single "CI" orchestrator run,
    # whose Build/Test/Quality/E2E stages surface as jobs named "<Stage> / <Job>". See the pipeline
    # configuration docs to adapt these matchers to another CI layout.
    pipeline:
        categories:
            - name: "Build"
              nodes:
                  - key: "build-native"
                    label: "Native"
                    job-name-matchers: ["Build / Build .war artifact"]
                  - key: "build-docker"
                    label: "Docker"
                    job-name-matchers: ["Build / Build and Push Docker Image"]
            - name: "Tests"
              nodes:
                  - key: "test-client"
                    label: "Client"
                    job-name-matchers: ["Test / Client Tests"]
                  - key: "test-server"
                    label: "Server"
                    job-name-matchers: ["Test / Server Tests"]
                  - key: "test-e2e"
                    label: "E2E"
                    job-name-matchers: ["E2E /"]
            - name: "Quality"
              nodes:
                  - key: "quality-client"
                    label: "Client"
                    job-name-matchers: ["Quality / Client Code Style"]
                  - key: "quality-server"
                    label: "Server"
                    job-name-matchers: ["Quality / Server Code Style", "Quality / Server Code Quality"]
