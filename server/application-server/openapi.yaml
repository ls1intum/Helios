        lockExpirationThreshold:
          type: integer
          format: int64
        lockReservationThreshold:
          type: integer
          format: int64
        lockWillExpireAt:
          type: string
          format: date-time
        lockReservationWillExpireAt:
          type: string
          format: date-time
      required:
      - id
      - name
    EnvironmentStatusDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        success:
          type: boolean
        state:
          type: string
          enum:
          - STARTING_UP
          - DB_MIGRATION_STARTED
          - DB_MIGRATION_FAILED
          - DB_MIGRATION_FINISHED
          - RUNNING
          - DEGRADED
          - SHUTTING_DOWN
          - STOPPED
          - FAILED
        httpStatusCode:
          type: integer
          format: int32
        checkedAt:
          type: string
          format: date-time
        checkType:
          type: string
          enum:
          - HTTP_STATUS
          - ARTEMIS_INFO
          - PUSH_UPDATE
        metadata:
          type: object
          additionalProperties: {}
      required:
      - checkType
      - checkedAt
      - httpStatusCode
      - id
      - success
