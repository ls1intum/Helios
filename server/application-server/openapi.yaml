components:
  schemas:
    ApiError:
      type: object
      properties:
        status:
          type: integer
          format: int32
        error:
          type: string
        message:
          type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time
    TestTypeDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 255
          minLength: 0
        artifactName:
          type: string
          maxLength: 255
          minLength: 0
        workflowId:
          type: integer
          format: int64
      required:
      - artifactName
      - name
      - workflowId
    DeploymentWorkflowConfigDto:
      type: object
      properties:
        workflowId:
          type: integer
          format: int64
        deployJobName:
          type: string
