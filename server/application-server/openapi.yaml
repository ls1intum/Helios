        url:
          type: string
        htmlUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        enabled:
          type: boolean
        installedApps:
          type: array
          items:
            type: string
        description:
          type: string
        serverUrl:
          type: string
        statusCheckType:
          type: string
          enum:
