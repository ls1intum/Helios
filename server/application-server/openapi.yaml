      type: object
      properties:
        key:
          type: string
          enum:
          - PRE_DEPLOYMENT
          - DEPLOYMENT
        label:
          type: string
        status:
          type: string
          enum:
          - completed
          - active
          - error
          - upcoming
          - unknown
        mode:
          type: string
          enum:
          - NONE
          - COMPLETED
          - FAILED
          - ESTIMATED
          - REMAINING
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        estimateSeconds:
          type: integer
          format: int32
      required:
      - key
      - label
      - mode
      - status
    EnvironmentDeployment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
        state:
          type: string
          enum:
          - REQUESTED
          - PENDING
          - WAITING
          - SUCCESS
          - ERROR
          - FAILURE
          - IN_PROGRESS
          - QUEUED
          - INACTIVE
          - CANCELLED
          - UNKNOWN
        statusesUrl:
          type: string
        sha:
          type: string
        ref:
          type: string
        task:
          type: string
        workflowRunHtmlUrl:
          type: string
        releaseCandidateNames:
          type: array
          items:
            type: string
        prName:
          type: string
        user:
