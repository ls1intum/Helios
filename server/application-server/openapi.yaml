      type: object
      properties:
        id:
          type: integer
          format: int64
        lockExpirationThreshold:
          type: integer
          format: int64
        lockReservationThreshold:
          type: integer
          format: int64
        packageName:
          type: string
    CategoryConfig:
      type: object
      properties:
        name:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeConfig"
    NodeConfig:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        jobNameMatchers:
          type: array
          items:
            type: string
        workflowNameMatcher:
          type:
          - string
          - "null"
    PipelineConfigDto:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryConfig"
    WorkflowGroupDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        orderIndex:
          type: integer
          format: int32
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowMembershipDto"
      required:
      - id
      - name
      - orderIndex
    WorkflowMembershipDto:
      type: object
      properties:
        workflowId:
          type: integer
          format: int64
        orderIndex:
          type: integer
          format: int32
      required:
      - orderIndex
      - workflowId
    ReleaseCandidateNameUpdateDto:
      type: object
      properties:
        oldName:
          type: string
        newName:
          type: string
    UpdateReleaseNotesDto:
      type: object
      properties:
        name:
          type: string
        notes:
          type: string
    DeploymentTimerDto:
      type: object
      properties:
        title:
          type: string
        headerMode:
          type: string
          enum:
          - NONE
          - DURATION
          - ESTIMATED
          - REMAINING
        headerStartedAt:
          type: string
          format: date-time
        headerEndedAt:
          type: string
          format: date-time
        headerEstimateSeconds:
          type: integer
          format: int32
        showQueuedMessage:
          type: boolean
        steps:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentTimerStepDto"
      required:
      - headerMode
      - steps
      - title
