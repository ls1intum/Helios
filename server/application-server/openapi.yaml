    put:
      tags:
      - workflow-controller
      operationId: updateWorkflowLabel
      parameters:
      - name: workflowId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: string
              enum:
              - NONE
              - TEST
        required: true
      responses:
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
