<div class="flex flex-col gap-3 items-center">
  @if (isLoggedIn()) {
    <p-button class="flex gap-3 items-center cursor-pointer" (click)="profileMenu.toggle($event)" size="small">
      <span class="relative inline-flex flex-shrink-0">
        <p-avatar class="size-5" shape="circle" size="normal" [image]="getProfilePictureUrl()" />
        @if (pendingApprovalsCount() > 0) {
          <p-badge
            [value]="pendingApprovalsCount().toString()"
            severity="warn"
            class="!absolute -top-1.5 -right-1.5 !flex !items-center !justify-center !h-[1.1rem] !min-w-[1.1rem] !p-0 !text-[0.65rem] !leading-none"
          />
        }
      </span>
      <span class="hidden md:block text-md truncate max-w-[130px]">{{ fullName() }}</span>
    </p-button>
  } @else {
    <p-button (click)="login()" class="rounded-xl flex items-center justify-center gap-2 w-full" size="small">
      <i-tabler name="brand-github" class="!size-5 !stroke-1"></i-tabler>
      <span class="hidden md:block">Sign In</span>
    </p-button>
  }
</div>

<p-popover #profileMenu>
  <div class="flex flex-col items-start gap-2">
    <!-- Pending deployment approvals -->
    <p-button [routerLink]="'/pending-approvals'" severity="secondary" text size="small">
      <i-tabler name="checklist" class="!size-5 !stroke-1"></i-tabler>
      <span>Pending approvals</span>
      @if (pendingApprovalsCount() > 0) {
        <p-badge [value]="pendingApprovalsCount().toString()" severity="warn" styleClass="ml-2" />
      }
    </p-button>

    <!-- Settings Button -->
    <p-button [routerLink]="'/settings'" severity="secondary" text size="small">
      <i-tabler name="settings" class="!size-5 !stroke-1"></i-tabler>
      <span>Settings</span>
    </p-button>

    <!-- Sign Out Button -->
    <p-button (click)="logout()" severity="secondary" text size="small">
      <i-tabler name="logout" class="!size-5 !stroke-1 !text-red-500 !hover:text-red-700"></i-tabler>
      <span>Sign Out</span>
    </p-button>
  </div>
</p-popover>
