<h3 class="text-2xl">Test Environments</h3>
<p-accordion [multiple]="true">
  <p-accordionTab *ngFor="let environment of environments()">
    <ng-template pTemplate="header">
      <div class="flex gap-2 items-center w-full">
        <span>{{ environment.name }}</span>
        <app-lock-tag [isLocked]="false"></app-lock-tag>
        <div class="flex-grow"></div>


        <a [href]="getFullUrl(environment.serverUrl)" target="_blank" class="p-button p-button-secondary p-2"
          (click)="$event.stopPropagation()">
          <i-tabler name="external-link" class="mr-1"></i-tabler>Open
        </a>
        <a icon [routerLink]="'/project/projectId/environment/' + environment.id + '/edit'"
          class="p-button p-button-secondary p-2"><i-tabler name="pencil" /></a>
      </div>
    </ng-template>

    <!-- Environment Content -->
    <app-environment-commit-info [environmentId]="environment.id" />

    <div class="flex gap-4 items-center justify-between">
      <!-- History Link -->
      <div class="flex gap-1 mt-2 items-center">
        <a class="p-button p-button-text text-gray-500 p-2"
          [routerLink]="['/project', projectId, 'environment', environment.id, 'history']">
          <i-tabler class="mr-1" name="history" />
          View History
        </a>
      </div>

      <!-- Installed Apps Tags -->
      <div class="flex gap-1">
        <p-tag *ngFor="let installedApp of environment.installedApps">
          {{ installedApp }}
        </p-tag>
      </div>
    </div>
  </p-accordionTab>
</p-accordion>
