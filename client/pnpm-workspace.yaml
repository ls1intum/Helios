verifyDepsBeforeRun: false

# TEMPORARY (2026-05-28): pnpm 11.3+ defaults to a 24h `minimumReleaseAge` supply-chain
# policy that blocks `pnpm install --frozen-lockfile` on any lockfile entry younger than
# the cutoff. `@angular/cdk@21.2.13` (in staging since #1093 yesterday) is currently ~16h
# old, so every PR's CI client install fails. Relaxed to 0 to unblock the staging deploy
# and the parallel testing of feat/deployment-approval-in-helios (#1098) on helios-staging.
# REVERT (restore default by removing this line, or set back to 86400) once the package
# ages past the cutoff later today.
minimumReleaseAge: 0

# pnpm 11 blocks dependency build scripts by default and, under
# --frozen-lockfile, fails hard (ERR_PNPM_IGNORED_BUILDS) unless each package is
# explicitly approved. `allowBuilds` is pnpm 11's replacement for the old
# `onlyBuiltDependencies` key. These are the native/tooling packages that ship
# build scripts; their platform binaries come from optional deps, so the build
# works on linux/CI once they're approved here.
allowBuilds:
  '@parcel/watcher': true
  '@sentry/cli': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true

# Force patched versions of transitive dependencies flagged by Dependabot.
# All of these are pulled in solely through the build/dev toolchain (Angular
# build + dev-server chain, vite, hey-api), never by application runtime code.
# Each is pinned to the lowest release that clears the corresponding advisory
# while staying within the consumer's major (so the build/test pipeline that
# uses the esbuild `application` builder + Vitest is unaffected):
#  - webpack-dev-server <5.2.4: cross-origin source exposure on non-HTTPS origins.
#  - uuid <11.1.1: missing buffer bounds check; sockjs only calls uuid.v4().
#  - undici 6.x <6.27.0 / 7.x <7.28.0: Set-Cookie/Host-header/SOCKS5/cache CVEs.
#  - hono <4.12.25: CORS wildcard reflection + several adapter/path CVEs.
#  - tar <7.5.16: PAX size-override parser differential (file smuggling).
#  - piscina 5.0.0-5.1.4: prototype-pollution gadget -> RCE via options.filename.
#  - http-proxy-middleware <3.0.7: CRLF field injection + Host-header routing
#    bypass. The esbuild builder pulls 3.0.5; the unused webpack dev-server pulls
#    2.0.9, so forcing 3.0.7 globally clears both (webpack serve is not used —
#    the `application` builder serves via Vite).
#  - launch-editor <2.14.1: NTLMv2 hash disclosure via UNC paths on Windows.
#  - js-yaml <4.2.0: quadratic-complexity DoS in merge-key handling.
#  - @babel/core <=7.29.0: arbitrary file read via sourceMappingURL comment. Pinned to the
#    patched 7.29.7 (>7.29.0) — NOT the 8.x line: Angular 21's build (esbuild/AOT linker) is
#    not Babel-8 compatible and crashes with "NumericLiterals must be non-negative" on
#    dependency ESM (e.g. PrimeNG 21). 7.29.7 clears the advisory and builds cleanly.
#  - esbuild 0.27.3-0.28.0: arbitrary file read via the dev server on Windows.
#  - vite 7.x <7.3.5: `server.fs.deny` bypass + launch-editor UNC disclosure.
#    Vite has since moved to the 8.x line (unaffected by this 7.x advisory); the
#    `vite@7` override forces any lingering transitive 7.x resolution up to the
#    8.x release used directly by Vitest / @angular/build.
overrides:
  webpack-dev-server: 6.0.0
  uuid: 14.0.1
  undici@6: 8.6.0
  undici@7: 8.6.0
  hono: 4.12.27
  tar: 7.5.19
  piscina: 5.2.0
  http-proxy-middleware: 4.1.1
  launch-editor: 2.14.1
  js-yaml: 5.2.1
  '@babel/core': 8.0.1
  esbuild: 0.28.1
  vite@7: 8.1.3
